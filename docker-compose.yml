version: '3.8'

services:
  wol-switch:
    image: lostome/wol_secure_lightswitch:latest
    container_name: wol_secure_lightswitch
    restart: unless-stopped
    network_mode: host # fundamental for wake on lan
    environment:
      - PORT=7500 # change this port to your own liking, if there is no port set, it will default to 7500
    volumes:
      - ./data:/app/data # here you have to put your hosts.yaml. Follow the example in hosts.yaml.example
